version: 2

models:
  - name: fct_sales
    description: "Tabla de hechos de ventas"
    columns:
      - name: lineitem_id
        tests:
          - unique
          - not_null
      - name: customer_id
        tests:
          - relationships:
              arguments:
                to: ref('dim_customers')
                field: customer_id
      - name: net_item_sales_amount
        tests:
          - test_no_negative_values

  - name: dim_customers
    description: "Dimensión de clientes"
    columns:
      - name: customer_id
        tests:
          - unique
          - not_null

  - name: dim_date
    description: "Dimensión de tiempo"
    columns:
      - name: date_id
        tests:
          - unique
          - not_null
  - name: dim_locations
    description: "Dimensión de ubicación"
    columns:
      - name: nation_id
        tests:
          - unique
          - not_null
          